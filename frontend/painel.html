<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Maya — Sly Design</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a14;color:#ddd;font-family:'Montserrat',sans-serif;font-size:15px;padding:14px}
h1{color:#c084fc;font-size:1.3em;margin-bottom:12px;font-weight:700}
.tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.tab{background:#1a1a2e;color:#888;border:none;padding:8px 12px;border-radius:8px 8px 0 0;cursor:pointer;font-size:.8em;font-family:'Montserrat',sans-serif}
.tab.active{background:#2a2a4e;color:#c084fc}
.tab.extra{background:#1e1212;color:#f87171;margin-left:auto}
.tab.extra.active{background:#3a1a1a;color:#fca5a5}
.panel{display:none;animation:fade .3s}
.panel.active{display:block}
@keyframes fade{from{opacity:0}}
.grid{display:grid;grid-template-columns:1fr;gap:10px}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;background:#111120;border-radius:12px;padding:10px}
table{width:100%;border-collapse:collapse;min-width:600px;font-size:.78em}
th{background:#1a1a30;color:#c084fc;padding:7px 5px;text-align:left;position:sticky;top:0;font-weight:600}
td{padding:5px;border-bottom:1px solid #1a1a2e}
td input,td select{background:#0a0a14;border:1px solid #333;color:#ddd;padding:4px 6px;border-radius:5px;font-size:.82em;font-family:'Montserrat',sans-serif}
td select{cursor:pointer}
td select:hover{border-color:#c084fc}
tr:hover{background:#1a1a30}
tr.feito{background:#0a1a0a}tr.feito:hover{background:#0f2a0f}
tr.andamento{background:#1a1a0a}tr.andamento:hover{background:#2a2a0f}
tr.novo{background:#0a0a1a}tr.novo:hover{background:#0f0f2a}
tr.cancelado{background:#1a0a0a}tr.cancelado:hover{background:#2a0f0f}
tr.pago_site{background:#0a1a1a}tr.pago_site:hover{background:#0f2a2a}
td .badge{padding:2px 8px;border-radius:10px;font-size:.7em;font-weight:600;display:inline-block}
.bg-verde{background:#1a3a1a;color:#4ade80}.bg-amarelo{background:#3a3a1a;color:#fbbf24}
.bg-azul{background:#1a2a3a;color:#93c5fd}.bg-vermelho{background:#3a1a1a;color:#f87171}
.bg-roxo{background:#2a1a3a;color:#c084fc}.bg-ciano{background:#1a2a2a;color:#67e8f9}
.dt{color:#c084fc;font-weight:700}
.fat-sidebar{background:#111120;border-radius:12px;padding:14px}
.fat-sidebar h3{color:#c084fc;font-size:.95em;margin-bottom:8px;font-weight:600}
.fat-row{display:flex;justify-content:space-between;padding:5px 0;font-size:.8em;border-bottom:1px solid #1a1a2e}
.fat-total{font-weight:700;color:#c084fc;font-size:.9em;margin-top:8px;padding-top:8px;border-top:2px solid #333}
.fat-site{color:#fbbf24}
.fat-ano{background:#1a1a2e;border-radius:10px;padding:12px;margin-bottom:10px}
.fat-ano h3{color:#c084fc;font-size:.9em;margin-bottom:5px;font-weight:600}
.fat-ano .big{font-size:1.4em;color:#c084fc;font-weight:700}
.fat-ano .sub{font-size:.75em;color:#888}
.cta-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.btn{background:#2a2a4e;color:#c084fc;border:1px solid #444;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:.8em;font-family:'Montserrat',sans-serif;transition:background .2s}
.btn:hover{background:#3a3a5e}
.btn.sm{font-size:.7em;padding:5px 9px;border-radius:6px}
.btn.danger{background:#3a1a1a;color:#fca5a5;border-color:#7f1d1d}
.btn.success{background:#1a3a1a;color:#86efac;border-color:#14532d}
.btn.warn{background:#3a2a1a;color:#fbbf24;border-color:#4a2a1a}
.btn.info{background:#1a2a3a;color:#93c5fd;border-color:#1e3a5f}
.form-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.form-row input,.form-row select{flex:1;min-width:100px;background:#1a1a2e;border:1px solid #333;color:#ddd;padding:8px 10px;border-radius:8px;font-size:.82em;font-family:'Montserrat',sans-serif}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:.8em;z-index:200;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.card{background:#1a1a2e;border-radius:10px;padding:14px;margin-bottom:8px}
.card-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.card-tel{color:#c084fc;font-weight:700;font-size:.88em}
.card-status{padding:3px 10px;border-radius:10px;font-size:.68em;font-weight:600}
.s-ativo{background:#1a3a1a;color:#4ade80}
.s-pagamento{background:#3a2a1a;color:#fbbf24}
.s-humano{background:#3a1a1a;color:#f87171}
.s-aguardando-humano{background:#3a1a2a;color:#fca5a5}
.s-confirmado{background:#1a2a1a;color:#67e8f9}
.s-pix{background:#3a3a1a;color:#fbbf24}
.s-shay{background:#1a2a3a;color:#93c5fd}
.s-shay-assumiu{background:#2a1a3a;color:#c084fc}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:100;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-box{background:#1a1a2e;border-radius:16px;padding:20px;max-width:480px;width:90%;border:1px solid #333;max-height:85vh;overflow-y:auto}
.modal-box h3{color:#c084fc;margin-bottom:12px}
@media(min-width:900px){
  body{max-width:1140px;margin:0 auto;padding:22px}
  h1{font-size:1.5em}
  .grid{grid-template-columns:1fr 290px}
}
</style>
</head>
<body>

<h1>Maya — Gestao Sly Design</h1>
<div class="tabs" id="tabs"></div>

<div class="panel active" id="tab-clientes">
  <div class="fat-ano" id="fatAno"></div>
  <div class="table-wrap" id="slidesHoje" style="margin-bottom:14px"></div>
  <div class="cta-bar">
    <button class="btn" onclick="carregarTudo()">Atualizar</button>
    <button class="btn success" onclick="abrirModal('add')">+ Pedido Manual</button>
    <button class="btn info sm" onclick="testarWebhook()" style="font-size:.7em">🔌 Testar Webhook Site</button>
  </div>
  <div id="clientes">Carregando...</div>
</div>

<div class="panel" id="tab-meses"></div>
<div class="toast" id="toast"></div>

<script>
const MESES=['','Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const TIPOS=['📄 PDF','🎬 Canva (Transicoes)','🎬 PowerPoint (Transicoes)','🎨 Canva Temas','🎨 PPTX Temas','Modelo','Banner','Post','Arte','Video','Mapa Mental','Trabalho Escrito','Outro'];
const SITUACOES=['Novo','Em andamento','Feito','Cancelado','Pago (Site)'];
const PAGAMENTOS=['Aguardando','50% pago','Pago'];
const RESP=['SF','SA'];
let mesAtual=6,autoRefresh,tabAtiva='clientes';

function t(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2500)}
async function api(p,b){const r=await fetch(p,{method:b?'POST':'GET',credentials:'same-origin',headers:b?{'Content-Type':'application/json'}:{},body:b?JSON.stringify(b):undefined});if(!r.ok){throw new Error('HTTP '+r.status)}const t=await r.text();try{return JSON.parse(t)}catch(e){console.error('API erro:',t.slice(0,100));return{}}}

// ===== HELPERS =====
function sel(id,opts,val){return `<select id="${id}" style="width:100%">${opts.map(o=>`<option ${o.trim()===String(val).trim()?'selected':''}>${o.trim()}</option>`).join('')}</select>`}
function badgeClass(sit){
  if(sit==='Feito'||sit==='Pago (Site)')return'bg-verde';if(sit==='Em andamento')return'bg-amarelo';
  if(sit==='Cancelado')return'bg-vermelho';if(sit==='Novo')return'bg-azul';return'bg-roxo';
}
function pgClass(pg){if(pg==='Pago')return'bg-verde';if(pg==='50% pago')return'bg-amarelo';return'bg-roxo'}
function rowClass(sit){if(sit==='Feito'||sit==='Pago (Site)')return'feito';if(sit==='Em andamento')return'andamento';if(sit==='Cancelado')return'cancelado';if(sit==='Novo')return'novo';return''}
function esc(s){return(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;')}

// ===== AUTO REFRESH =====
function ir(){clearInterval(autoRefresh);autoRefresh=setInterval(()=>{if(tabAtiva==='clientes')carregarClientes('ativos');else if(tabAtiva==='aceitar')carregarClientes('confirmados');else if(tabAtiva==='pix')carregarClientes('pix')},30000)}

// ===== CLIENTES ATIVOS =====
async function carregarClientes(filtro){
  try{
  const[d,f,h]=await Promise.all([api('/painel/dados'),api('/painel/faturamento'),api('/painel/hoje')]);
  document.getElementById('fatAno').innerHTML=`<h3>Faturamento 2026</h3><div class="big">R$ ${(f.total_ano||0).toFixed(2)}</div><div class="sub" style="font-size:.82em;line-height:1.8">
    <div>Shayene (SF): <b style="color:#c084fc">R$ ${(f.total_shay||0).toFixed(2)}</b></div>
    <div style="color:#888">Samuel (SA): R$ ${(f.total_samuel||0).toFixed(2)}</div>
    <div class="fat-site">Site (liquido): R$ ${(f.total_site||0).toFixed(2)}</div>
    <div style="color:#888;font-size:.75em">Bruto: R$ ${(f.total_site_bruto||0).toFixed(2)} | Taxas: R$ ${(f.taxas_site||0).toFixed(2)}</div>
    <div style="color:#fbbf24">A receber (50% restante): <b>R$ ${(f.a_receber||0).toFixed(2)}</b></div>
    <div style="color:#67e8f9;margin-top:2px">Pedidos realizados: ${d.pedido_realizado||0} clientes</div>
    <div style="color:#fbbf24;margin-top:2px">Aguardando Pix: ${d.aguardando_pix||0} clientes</div>
    <div style="color:#888;margin-top:2px">Aguardando pagamento: ${d.aguardando||0} clientes</div>
    <div style="color:#fca5a5;margin-top:2px">Querem atendente: ${d.aguardando_humano||0} clientes</div>
  </div>`;

  // Slides para hoje
  const ph=h.pedidos||[];
  document.getElementById('slidesHoje').innerHTML=ph.length?`
    <div style="color:#c084fc;font-weight:700;margin-bottom:6px">📅 Slides para Hoje (${h.data})</div>
    <table><tr><th>Entrega</th><th>Cliente</th><th>Arquivo</th><th>Tema</th><th>Valor</th><th>Sit</th><th>PG</th></tr>
    ${ph.map(p=>`<tr class="${rowClass(p.situacao||'')}"><td class="dt">${p.entrega||p.data||''}</td><td>${p.cliente||''}</td><td>${p.arquivo||''}</td><td>${p.tema||''}</td><td>${p.valor||''}</td><td><span class="badge ${badgeClass(p.situacao||'')}">${p.situacao||''}</span></td><td><span class="badge ${pgClass(p.pg||'')}">${p.pg||''}</span></td></tr>`).join('')}
    </table>`:'<div style="text-align:center;color:#555;padding:10px;font-size:.8em">Nenhum slide para hoje ✨</div>';

  const el=document.getElementById('clientes');
  let clientesFiltrados = d.clientes;
  if(filtro==='confirmados') clientesFiltrados = d.clientes.filter(c=>c.pedido_confirmado);
  else if(filtro==='pix') clientesFiltrados = d.clientes.filter(c=>c.aguardando_pix);
  else if(filtro==='ativos') clientesFiltrados = d.clientes.filter(c=>!c.pedido_confirmado && !c.aguardando_pix);
  if(!clientesFiltrados.length){el.innerHTML='<div style="text-align:center;color:#555;padding:40px">Nenhum cliente ativo ✨</div>';return}
  el.innerHTML=clientesFiltrados.map(c=>{
    const extrasInfo = c.extras && c.extras !== '-' && c.extras !== 'Nenhum' ? `<br><b>Extras:</b> ${c.extras.substring(0,60)}${c.extras.length>60?'...':''}` : '';
    const info=c.quer_atendente && !c.shay_assumiu
      ?`<div style="color:#fca5a5;font-size:.8em;margin:6px 0">🆘 Este cliente pediu para falar com um <b>atendente humano</b>.<br><span style="color:#888;font-size:.85em">📞 ${c.telefone}</span></div>`
      :`<div style="color:#999;font-size:.77em;margin:6px 0"><b>Tema:</b> ${c.tema}<br><b>Modelo:</b> ${c.modelo} | <b>Prazo:</b> ${c.prazo}<br><b>Valor:</b> ${c.valor}${extrasInfo}<br><span style="color:#666;font-size:.85em">📞 ${c.telefone}</span></div>`;
    let botoes='';
    if(c.quer_atendente){
      if(c.shay_assumiu){
        botoes=`<button class="btn success sm" onclick="aceitarPedido('${c.telefone}')">✅ Aceitar Pedido</button>
          <button class="btn sm" onclick="finalizar('${c.telefone}')" style="color:#888">Finalizar</button>`;
      }else{
        botoes=`<button class="btn danger sm" onclick="bloquear('${c.telefone}')">Assumir Atendimento</button>
          <button class="btn sm" onclick="finalizar('${c.telefone}')" style="color:#888">Finalizar</button>`;
      }
    }else if(c.pedido_confirmado){
      botoes=`<button class="btn success sm" onclick="aceitarPedido('${c.telefone}')">✅ Aceitar pedido e pedir Pix</button>
        <button class="btn danger sm" onclick="rejeitar('${c.telefone}')">❌ Recusar pedido</button>
        <button class="btn sm" onclick="finalizar('${c.telefone}')" style="color:#888">Finalizar</button>`;
    }else if(c.aguardando_pix){
      botoes=`<button class="btn success sm" onclick="confirmar('${c.telefone}')">✅ Confirmar Pedido</button>
        <button class="btn danger sm" onclick="cancelarPedidoCliente('${c.telefone}')">❌ Pedido Cancelado</button>
        <button class="btn sm" onclick="finalizar('${c.telefone}')" style="color:#888">Finalizar</button>`;
    }else{
      botoes=`${c.aguardando?`<button class="btn success sm" onclick="confirmar('${c.telefone}')">Confirmar</button><button class="btn warn sm" onclick="rejeitar('${c.telefone}')">Rejeitar</button>`:''}
        <button class="btn info sm" onclick="cutucar('${c.telefone}')">Cutucar</button>
        ${c.humano?`<button class="btn sm" onclick="liberar('${c.telefone}')">Liberar Maya</button>`:`<button class="btn danger sm" onclick="bloquear('${c.telefone}')">Bloquear Maya</button>`}
        <button class="btn sm" onclick="finalizar('${c.telefone}')" style="color:#888">Finalizar</button>`;
    }
    return`<div class="card">
      <div class="card-head">
        <span class="card-tel">📱 ${c.telefone}</span>
        <span class="card-status ${c.statusCls.replace('status-','s-')}">${c.statusTxt}</span>
      </div>
      ${info}
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:6px">${botoes}</div>
    </div>`}).join('');
  }catch(e){document.getElementById('clientes').innerHTML='<div style="color:#f87171;padding:20px;text-align:center">Erro ao carregar: '+e.message+'</div>';console.error(e);}
}
async function bloquear(tel){await api('/painel/bloquear',{telefone:tel});t('Maya bloqueada');carregarClientes()}
async function liberar(tel){await api('/painel/liberar',{telefone:tel});t('Maya liberada');carregarClientes()}
async function confirmar(tel){await api('/painel/confirmar',{telefone:tel});t('Pedido confirmado!');carregarClientes();if(tabAtiva==='mes')carregarMes(mesAtual)}
async function rejeitar(tel){const m=prompt('Motivo:');if(!m)return;await api('/painel/rejeitar',{telefone:tel,motivo:m});t('Rejeitado');carregarClientes()}
async function cutucar(tel){await api('/painel/cutucar',{telefone:tel});t('Cutucando...')}
async function aceitarPedido(tel){if(!confirm('Aceitar pedido e enviar Pix para '+tel+'?'))return;await api('/painel/aceitar-pedido',{telefone:tel});t('Pedido aceito! Mensagem enviada.');carregarClientes()}
async function cancelarPedidoCliente(tel){if(!confirm('Cancelar pedido de '+tel+'? O cliente sera notificado.'))return;await api('/painel/cancelar-pedido-cliente',{telefone:tel});t('Pedido cancelado');carregarClientes()}
async function finalizar(tel){if(!confirm('Finalizar atendimento de '+tel+'?'))return;await api('/painel/finalizar',{telefone:tel});t('Finalizado');carregarClientes()}

// ===== MESES =====
async function carregarMes(mes){
  mesAtual=mes;const d=await api(`/painel/mes/${mes}`);const ped=d.pedidos||[],fat=d.faturamento||{};
  let rows=ped.map(p=>`<tr class="${rowClass(p.situacao||'')}">
    <td class="dt">${p.entrega||p.data||''}</td>
    <td>${esc(p.cliente||'')}</td>
    <td>${esc(p.arquivo||'')}</td>
    <td>${esc(p.tema||'')}</td>
    <td>${esc(p.valor||'')}</td>
    <td><span class="badge ${badgeClass(p.situacao||'')}">${p.situacao||''}</span></td>
    <td><span class="badge ${pgClass(p.pg||'')}">${p.pg||''}</span></td>
    <td>${p.responsavel||'SF'}</td>
    <td style="white-space:nowrap"><button class="btn sm" onclick="editarLinha(${p.id})">Editar</button><button class="btn danger sm" onclick="deletarPedido(${p.id})" style="margin-left:3px">X</button></td>
  </tr>`).join('');
  if(!rows)rows='<tr><td colspan="9" style="text-align:center;color:#555;padding:20px">Nenhum pedido neste mes</td></tr>';
  document.getElementById('tab-meses').innerHTML=`
    <div class="grid">
      <div class="table-wrap">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span style="color:#c084fc;font-weight:700">${MESES[mes]} 2026</span>
          <span style="color:#888;font-size:.72em">${ped.length} pedidos</span>
        </div>
        <table><tr><th>Entr.</th><th>Cliente</th><th>Arquivo</th><th>Tema</th><th>Valor</th><th>Sit</th><th>PG</th><th>Resp</th><th></th></tr>${rows}</table>
      </div>
      <div class="fat-sidebar"><h3>${MESES[mes]}</h3><div class="fat-row"><span>Pedidos</span><span>R$ ${fat.pedidos?.toFixed(2)||'0.00'}</span></div><div class="fat-row fat-site"><span>Site</span><span>R$ ${fat.site?.toFixed(2)||'0.00'}</span></div><div class="fat-total" style="font-size:1.1em"><span>Total</span><span>R$ ${fat.total?.toFixed(2)||'0.00'}</span></div></div>
    </div>`;
}

async function editarLinha(id){
  const d=await api(`/painel/mes/${mesAtual}`);const ped=(d.pedidos||[]).find(p=>p.id===id);
  if(!ped)return;const el=document.getElementById('tab-meses');
  const arquivo=ped.arquivo||'';const ehTemas=arquivo.includes('Temas');
  el.innerHTML=`
    <div class="fat-sidebar" style="max-width:500px;margin:0 auto">
      <h3>Editando Pedido #${id}</h3>
      <div class="form-row"><label style="color:#888;font-size:.8em">Entrega</label><input value="${esc(ped.entrega||ped.data||'')}" id="ed_entrega"></div>
      <div class="form-row"><label style="color:#888;font-size:.8em">Cliente</label><input value="${esc(ped.cliente||'')}" id="ed_cliente"></div>
      <div class="form-row"><label style="color:#888;font-size:.8em">Arquivo</label>${sel('ed_arquivo',TIPOS,arquivo)}</div>
      ${ehTemas?`<div class="form-row"><label style="color:#888;font-size:.8em">Tema Design</label><input value="${esc(ped.tema_design||'')}" id="ed_tdesign"></div>`:''}
      <div class="form-row"><label style="color:#888;font-size:.8em">Tema</label><input value="${esc(ped.tema||'')}" id="ed_tema"></div>
      <div class="form-row"><label style="color:#888;font-size:.8em">Valor</label><input value="${esc(ped.valor||'')}" id="ed_valor"></div>
      <div class="form-row"><label style="color:#888;font-size:.8em">Situacao</label>${sel('ed_sit',SITUACOES,ped.situacao||'Novo')}</div>
      <div class="form-row"><label style="color:#888;font-size:.8em">PG</label>${sel('ed_pg',PAGAMENTOS,ped.pg||'Aguardando')}</div>
      <div class="form-row"><label style="color:#888;font-size:.8em">Resp</label>${sel('ed_resp',RESP,ped.responsavel||'SF')}</div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn success" onclick="salvarEdicao(${id})">Salvar</button>
        <button class="btn" onclick="carregarMes(mesAtual)">Cancelar</button>
      </div>
    </div>`;
}

async function salvarEdicao(id){
  const d={id};
  ['entrega','cliente','tema','valor','tdesign'].forEach(k=>{const v=document.getElementById('ed_'+k);if(v)d[k==='tdesign'?'tema_design':k]=v.value});
  ['arquivo','sit','pg','resp'].forEach(k=>{const v=document.getElementById('ed_'+k);if(v)d[k==='sit'?'situacao':k==='resp'?'responsavel':k]=v.value});
  if(d.arquivo&&d.arquivo.includes('Temas')&&d.tema_design)d.arquivo=d.arquivo+' — '+d.tema_design;
  await api('/painel/editar-pedido',d);t('Salvo!');carregarMes(mesAtual);
}
async function deletarPedido(id){if(!confirm('Deletar #'+id+'?'))return;await api('/painel/deletar-pedido',{id});t('Removido');carregarMes(mesAtual)}

// ===== FATURAMENTO =====
async function carregarFaturamento(){
  const d=await api('/painel/faturamento');const fat=d.mensal||{};let rows='';
  for(let m=1;m<=12;m++){const f=fat[m]||{pedidos:0,site:0,total:0};rows+=`<div class="fat-row"><span>${MESES[m]}</span><span>R$ ${f.total.toFixed(2)}</span></div>`}
  document.getElementById('tab-meses').innerHTML=`<div class="fat-sidebar" style="max-width:480px;margin:0 auto"><h3>Faturamento 2026</h3>${rows}<div class="fat-total" style="font-size:1.15em"><span>TOTAL 2026</span><span>R$ ${(d.total_ano||0).toFixed(2)}</span></div><div style="margin-top:12px;font-size:.85em;line-height:2">
    <div><b>Shayene (SF):</b> <span style="color:#c084fc;font-weight:700">R$ ${(d.total_shay||0).toFixed(2)}</span></div>
    <div style="color:#888"><b>Samuel (SA):</b> R$ ${(d.total_samuel||0).toFixed(2)}</div>
    <div class="fat-site"><b>Site (liquido):</b> R$ ${(d.total_site||0).toFixed(2)}</div>
    <div style="color:#888;font-size:.75em">Bruto: R$ ${(d.total_site_bruto||0).toFixed(2)} | Taxas: R$ ${(d.taxas_site||0).toFixed(2)}</div>
    <div style="color:#fbbf24;margin-top:4px"><b>A receber:</b> R$ ${(d.a_receber||0).toFixed(2)} <span style="font-size:.75em;color:#888">(50% restante)</span></div>
  </div></div>`;
}

// ===== MODAL =====
function abrirModal(tipo){
  let h='';
  if(tipo==='add'){
    h=`<h3>+ Pedido Manual</h3>
    <div class="form-row"><input placeholder="Cliente (telefone)" id="mCliente"><input placeholder="Data entrega (dd/mm)" id="mData"></div>
    <div class="form-row"><select id="mArquivo">${TIPOS.map(t=>`<option>${t}</option>`).join('')}</select><input placeholder="Tema" id="mTema"></div>
    <div class="form-row"><input placeholder="Valor (ex: 25,00)" id="mValor"><input placeholder="Prazo (ex: 20/06)" id="mPrazo"></div>
    <div class="form-row"><input placeholder="Nomes (ex: Joao, Maria)" id="mNomes"></div>
    <div class="form-row"><input placeholder="Extras / Observacoes" id="mExtras"></div>
    <div class="form-row">${sel('mSit',SITUACOES,'Novo')}${sel('mPg',PAGAMENTOS,'Aguardando')}${sel('mResp',RESP,'SF')}${sel('mMes',MESES.slice(1),MESES[mesAtual])}</div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn success" onclick="addManual()">Adicionar</button>
      <button class="btn info sm" onclick="abrirModalExtrair()" style="font-size:.7em">🤖 Extrair da Conversa</button>
    </div>`;
  }else if(tipo==='extrair'){
    h=`<h3>🤖 Extrair Pedido da Conversa</h3>
    <p style="color:#888;font-size:.8em;margin-bottom:10px">Cole o numero do WhatsApp do cliente.<br>A IA vai ler a conversa e preencher o formulario.</p>
    <div class="form-row"><input placeholder="Telefone (ex: 5538997507651)" id="mExtrairTel" style="font-size:1em;padding:12px"></div>
    <div id="extrairStatus" style="color:#888;font-size:.75em;margin:6px 0"></div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn success" onclick="extrairPedido()">🔍 Extrair</button>
      <button class="btn" onclick="document.getElementById('modal').remove();abrirModal('add')">Voltar ao Form</button>
    </div>`;
  }
  const m=document.createElement('div');m.className='modal show';m.id='modal';
  m.innerHTML=`<div class="modal-box">${h}</div>`;
  document.body.appendChild(m);
}
function abrirModalExtrair(){
  document.getElementById('modal').remove();
  abrirModal('extrair');
}
async function extrairPedido(){
  const tel=document.getElementById('mExtrairTel').value.trim();
  if(!tel)return t('Cole o numero do telefone');
  const st=document.getElementById('extrairStatus');
  st.innerHTML='⏳ Analisando conversa com IA...';
  try{
    const r=await api('/painel/extrair-pedido',{telefone:tel});
    if(r.status!=='ok'){st.innerHTML=`<span style="color:#f87171">❌ ${r.msg}</span>`;return}
    const p=r.pedido;
    st.innerHTML=`<span style="color:#4ade80">✅ Extraido! (fonte: ${r.fonte})</span>`;
    // Fecha modal de extracao e abre o formulario preenchido
    document.getElementById('modal').remove();
    abrirModal('add');
    // Preenche os campos
    setTimeout(()=>{
      const set=(id,val)=>{const el=document.getElementById(id);if(el&&val)el.value=val};
      set('mCliente',p.cliente||tel);
      set('mTema',p.tema);
      set('mPrazo',p.prazo);
      set('mNomes',p.nomes);
      set('mExtras',p.extras);
      if(p.arquivo){
        const sel=document.getElementById('mArquivo');
        if(sel){
          // Tenta achar o match mais proximo no select
          for(let i=0;i<sel.options.length;i++){
            const opt=sel.options[i].text;
            let arq=p.arquivo.replace(/[🎬🎨📄]/g,'').trim().toLowerCase();
            let optClean=opt.replace(/[🎬🎨📄]/g,'').trim().toLowerCase();
            if(optClean.includes(arq)||arq.includes(optClean)){
              sel.selectedIndex=i;break;
            }
          }
        }
      }
      if(p.valor){
        const val=p.valor.replace(/[R$\s]/g,'').replace(',','.');
        set('mValor',val);
      }
      t('Formulario preenchido! Revise e clique Adicionar ✅');
    },300);
  }catch(e){
    st.innerHTML=`<span style="color:#f87171">❌ Erro: ${e.message}</span>`;
  }
}
async function addManual(){
  const d={
    cliente:document.getElementById('mCliente').value,
    data:document.getElementById('mData').value,
    arquivo:document.getElementById('mArquivo').value,
    tema:document.getElementById('mTema').value,
    valor:'R$ '+document.getElementById('mValor').value,
    prazo:document.getElementById('mPrazo').value,
    nomes:document.getElementById('mNomes').value,
    extras:document.getElementById('mExtras').value,
    mes:MESES.indexOf(document.getElementById('mMes').value),
    situacao:document.getElementById('mSit').value,
    pg:document.getElementById('mPg').value,
    responsavel:document.getElementById('mResp').value,
    origem:'manual'
  };
  if(!d.cliente||!d.tema)return t('Preencha cliente e tema');
  // Passa prazo como entrega se preenchido
  if(d.prazo){d.entrega=d.prazo;if(!d.data)d.data=d.prazo}
  await api('/painel/adicionar-manual',d);
  t('Adicionado!');document.getElementById('modal').remove();carregarTudo();
}

async function testarWebhook(){
  t('🔌 Testando conexao com webhook do site...');
  try{
    const r=await fetch('/webhook/site');
    const d=await r.json();
    t('✅ Webhook ativo! URL: '+d.url);
  }catch(e){
    t('❌ Erro: '+e.message);
  }
}

// ===== INIT =====
function init(){
  let tabs='<button class="tab active" onclick="abrirTab(\'clientes\')">Clientes Ativos</button>';
  tabs+='<button class="tab" onclick="abrirTab(\'aceitar\')">Aceitar Pedido</button>';
  tabs+='<button class="tab" onclick="abrirTab(\'pix\')">Confirmar Pagamento</button>';
  for(let m=1;m<=12;m++)tabs+=`<button class="tab" onclick="abrirTab('mes',${m})">${MESES[m].substring(0,3)}</button>`;
  tabs+='<button class="tab extra" onclick="abrirTab(\'faturamento\')">Faturamento 2026</button>';
  document.getElementById('tabs').innerHTML=tabs;carregarTudo();ir();
}
function abrirTab(tipo,mes){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  tabAtiva=tipo;
  if(tipo==='clientes'){document.getElementById('tab-clientes').classList.add('active');document.querySelector('.tab').classList.add('active');carregarClientes('ativos')}
  else if(tipo==='aceitar'){document.getElementById('tab-clientes').classList.add('active');document.querySelectorAll('.tab')[1].classList.add('active');carregarClientes('confirmados')}
  else if(tipo==='pix'){document.getElementById('tab-clientes').classList.add('active');document.querySelectorAll('.tab')[2].classList.add('active');carregarClientes('pix')}
  else if(tipo==='mes'){document.getElementById('tab-meses').classList.add('active');carregarMes(mes);document.querySelectorAll('.tab').forEach((b,i)=>{const tabIdx=2+mes;if(i===tabIdx)b.classList.add('active')})}
  else if(tipo==='faturamento'){document.getElementById('tab-meses').classList.add('active');carregarFaturamento();document.querySelector('.tab.extra').classList.add('active')}
}
async function carregarTudo(){carregarClientes(tabAtiva==='aceitar'?'confirmados':tabAtiva==='pix'?'pix':'ativos');if(tabAtiva==='mes')carregarMes(mesAtual)}
init();
</script>
