<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />

    <!-- PWA -->
    <link rel="manifest" href="/painel/manifest.json" />
    <meta name="theme-color" content="#09090d" />

    <!-- Apple / iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Maya" />
    <link rel="apple-touch-icon" href="/painel/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/painel/icons/icon-512.png" />

    <!-- Splash screen iPhone (tela de carregamento) -->
    <link rel="apple-touch-startup-image" href="/painel/icons/splash-1170.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/painel/icons/splash-1290.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" />

    <title>Painel de Controle — Sly Design</title>
    <link rel="icon" href="/painel/icons/icon-192.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Registra o Service Worker para PWA
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/painel/sw.js').catch(function(err) {
          console.log('SW registro falhou (dev apenas):', err.message)
        })
      }
    </script>
  </body>
</html>
